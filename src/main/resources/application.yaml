app:
  hotels:
    events:
      topic: hotel.events
      group: hotel-service
    search:
      index: hotels
  jwt:
    secret: ${JWT_SECRET:my-very-secret-key-that-is-at-least-32-characters-long}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours

spring:
  application:
    name: staywise

  cloud:
    function:
      definition: consumeHotelEvents
    stream:
      bindings:
        consumeHotelEvents-in-0:
          destination: ${app.hotels.events.topic}
          group: ${app.hotels.events.group}
          content-type: application/json
        produceHotelEvents-out-0:
          destination: ${app.hotels.events.topic}
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092

  datasource:
    url: jdbc:postgresql://localhost:5432/staywise
    username: postgres
    password: postgres

  elasticsearch:
    uris: http://localhost:9200

  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  swagger-ui:
    url: /openapi.yaml