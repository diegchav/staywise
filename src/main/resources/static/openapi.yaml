openapi: 3.1.1
info:
  title: Booking Service API
  version: 0.1.0
  description: Hotel booking service API

servers:
  - url: http://localhost:8080

paths:
  /api/bookings:
    post:
      summary: Create a booking
      operationId: createBooking
      tags: [Bookings]

      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
          description: Unique key to make booking request idempotent

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'

      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'

        "400":
          description: Invalid request

        "409":
          description: No availability

    get:
      summary: List bookings by user
      operationId: listBookings
      tags: [Bookings]

      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingResponse'

  /api/bookings/{bookingId}:
    get:
      summary: Get booking by ID
      operationId: getBooking
      tags: [Bookings]

      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'

        "404":
          description: Booking not found

components:
  schemas:
    CreateBookingRequest:
      type: object
      required:
        - userId
        - hotelId
        - roomTypeId
        - checkIn
        - checkOut
      properties:

        userId:
          type: string
          format: uuid

        hotelId:
          type: string
          format: uuid

        roomTypeId:
          type: string
          format: uuid

        checkIn:
          type: string
          format: date

        checkOut:
          type: string
          format: date

    BookingResponse:
      type: object
      properties:

        id:
          type: string
          format: uuid

        userId:
          type: string
          format: uuid

        hotelId:
          type: string
          format: uuid

        roomTypeId:
          type: string
          format: uuid

        checkIn:
          type: string
          format: date

        checkOut:
          type: string
          format: date

        status:
          type: string
          example: CONFIRMED

        totalPrice:
          type: number
          format: double

        createdAt:
          type: string
          format: date-time