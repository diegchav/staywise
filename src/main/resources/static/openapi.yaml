openapi: 3.1.1
info:
  title: Booking Service API
  version: 0.1.0
  description: Hotel booking service API

servers:
  - url: http://localhost:8080

paths:
  /api/availability:
    get:
      summary: Search room availability
      description: Returns available room types for a hotel within a date range.
      operationId: searchAvailability
      tags: [Search]

      parameters:
        - name: hotelId
          in: query
          required: true
          schema:
            type: string
            format: uuid

        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date

        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date

      responses:
        "200":
          description: Available room types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableRoomType"
        "400":
          description: Invalid date range

  /api/bookings:
    post:
      summary: Create a booking
      operationId: createBooking
      tags: [Bookings]

      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
          description: Unique key to make booking request idempotent

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'

      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'

        "400":
          description: Invalid request

        "409":
          description: No availability

    get:
      summary: List bookings by user
      operationId: listBookings
      tags: [Bookings]

      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingResponse'

  /api/bookings/{bookingId}:
    get:
      summary: Get booking by ID
      operationId: getBooking
      tags: [Bookings]

      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'

        "404":
          description: Booking not found

  /api/bookings/{bookingId}/cancel:
    post:
      summary: Cancel a booking
      description: |
        Cancels an existing booking and releases reserved inventory.
        This operation is idempotent — cancelling an already cancelled booking
        returns success without additional side effects.
      operationId: cancelBooking
      tags: [Bookings]

      parameters:
        - name: bookingId
          in: path
          required: true
          description: Unique identifier of the booking
          schema:
            type: string
            format: uuid

      responses:
        "204":
          description: Booking successfully cancelled

        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "409":
          description: Booking cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AvailableRoomType:
      type: object
      properties:
        roomTypeId:
          type: string
          format: uuid
        availableRooms:
          type: integer
    CreateBookingRequest:
      type: object
      required:
        - userId
        - hotelId
        - roomTypeId
        - checkIn
        - checkOut
      properties:
        userId:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
        roomTypeId:
          type: string
          format: uuid
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date

    BookingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
        roomTypeId:
          type: string
          format: uuid
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        status:
          type: string
          example: CONFIRMED
        totalPrice:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: integer